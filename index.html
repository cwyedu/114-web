<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>114-web 課程實驗導覽</title>
    <!-- 使用 Google Fonts 提升質感 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            padding: 4rem 2rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        main {
            flex: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            width: 100%;
        }

        .lab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .lab-card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 2.5rem 2rem;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lab-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            background-color: #eff6ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            color: var(--primary-color);
            font-size: 1.5rem;
            font-weight: bold;
        }

        .lab-card h2 {
            margin-bottom: 1.5rem;
            font-size: 1.75rem;
        }

        .btn {
            display: inline-block;
            padding: 0.6rem 2rem;
            background-color: var(--primary-color);
            color: white;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .lab-card:hover .btn {
            background-color: #2563eb;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 640px) {
            header {
                padding: 2.5rem 1rem;
            }
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>114-web 課程目錄</h1>
        <p>歡迎來到我的網頁設計學習歷程與實驗作品集</p>
    </header>

    <main>
        <div class="lab-grid">
            <!-- Lab 1 連結 -->
            <a href="lab1/index.html" class="lab-card">
                <div class="icon-circle">01</div>
                <h2>Lab 1</h2>
                <div class="btn">進入實驗</div>
            </a>

            <!-- Lab 2 連結 -->
            <a href="lab2/index.html" class="lab-card">
                <div class="icon-circle">02</div>
                <h2>Lab 2</h2>
                <div class="btn">進入實驗</div>
            </a>

            <!-- Lab 3 連結 -->
            <a href="lab3/index.html" class="lab-card">
                <div class="icon-circle">03</div>
                <h2>Lab 3</h2>
                <div class="btn">進入實驗</div>
            </a>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 114-web 網頁設計實務</p>
    </footer>

</body>
</html>
