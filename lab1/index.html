<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡單隨機抽籤工具</title>
    <style>
        /* CSS 樣式設定 */
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: #1f2937;
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #4b5563;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 150px;
            padding: 0.75rem;
            border: 2px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1rem;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1.25rem;
            border-radius: 0.5rem;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        #result-container {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 0.5rem;
            background-color: #fef3c7;
            border: 2px dashed #f59e0b;
            display: none; /* 預設隱藏 */
        }

        #result-container.show {
            display: block;
            animation: bounceIn 0.5s ease-out;
        }

        .result-label {
            color: #92400e;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .winner-name {
            color: #b45309;
            font-size: 2.5rem;
            font-weight: 800;
            word-wrap: break-word;
        }

        /* 簡單的動畫效果 */
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .empty-message {
            color: #ef4444;
            margin-top: 0.5rem;
            font-size: 0.875rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 隨機抽籤器</h1>
        
        <div class="input-group">
            <label for="nameList">請輸入名單 (每行一個名字)：</label>
            <textarea id="nameList" placeholder="例如：&#10;小明&#10;小華&#10;阿強"></textarea>
            <div id="errorMsg" class="empty-message">請先輸入名單喔！</div>
        </div>

        <button onclick="drawLuckyOne()">開始抽籤！</button>

        <div id="result-container">
            <div class="result-label">✨ 中獎的是 ✨</div>
            <div id="winner" class="winner-name">?</div>
        </div>
    </div>

    <script>
        // JavaScript 邏輯處理
        function drawLuckyOne() {
            const textarea = document.getElementById('nameList');
            const resultContainer = document.getElementById('result-container');
            const winnerDisplay = document.getElementById('winner');
            const errorMsg = document.getElementById('errorMsg');

            // 1. 取得文字內容並處理
            // .split('\n') 依照換行分割成陣列
            // .map(s => s.trim()) 去除每個名字前後的空白
            // .filter(s => s !== '') 過濾掉空白行
            const names = textarea.value.split('\n')
                .map(name => name.trim())
                .filter(name => name !== '');

            // 2. 檢查名單是否為空
            if (names.length === 0) {
                errorMsg.style.display = 'block';
                resultContainer.classList.remove('show');
                return;
            }

            // 隱藏錯誤訊息
            errorMsg.style.display = 'none';

            // 3. 執行隨機抽選
            // Math.random() 產生 0~1 之間的浮點數
            // 乘以長度後用 Math.floor 取整數，得到隨機的陣列索引
            const randomIndex = Math.floor(Math.random() * names.length);
            const winner = names[randomIndex];

            // 4. 顯示結果
            winnerDisplay.textContent = winner;
            
            // 重新觸發動畫（先移除 class 再加上去）
            resultContainer.classList.remove('show');
            void resultContainer.offsetWidth; // 觸發重繪 (Reflow) 以重啟動畫
            resultContainer.classList.add('show');
        }
    </script>
</body>
</html>
